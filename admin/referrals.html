<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Referral Dashboard | PillowFlow</title>
  <style>
    :root{--navy:#17243f;--ink:#182033;--muted:#657086;--orange:#c75123;--cream:#f7f5f0;--line:#dfe3e8;--white:#fff;--green:#176b52;--red:#a32727}*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--ink);font:14px/1.5 Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}.wrap{width:min(1240px,calc(100% - 32px));margin:auto}header{padding:24px 0;background:var(--navy);color:#fff}.head{display:flex;align-items:center;justify-content:space-between;gap:20px}h1{margin:0;font-size:24px}header p{margin:2px 0 0;color:#cdd5e2}.token{display:flex;gap:8px}.token input,.filters select,.editor input,.editor select,.editor textarea{padding:10px 11px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);font:inherit}.token button,button{padding:10px 14px;border:0;border-radius:8px;background:var(--orange);color:#fff;font:inherit;font-weight:750;cursor:pointer}.token input{min-width:240px}.toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:24px 0}.filters{display:flex;gap:10px}.summary{color:var(--muted)}.panel{overflow:hidden;border:1px solid var(--line);border-radius:14px;background:#fff}.table-wrap{overflow:auto}table{width:100%;min-width:900px;border-collapse:collapse}th,td{padding:13px 15px;border-bottom:1px solid var(--line);text-align:left}th{background:#f0eee9;color:var(--muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase}tr[data-id]{cursor:pointer}tr[data-id]:hover{background:#fbf7f3}.badge{display:inline-flex;padding:3px 8px;border-radius:999px;background:#e9edf3;font-size:11px;font-weight:750}.empty{padding:45px;text-align:center;color:var(--muted)}dialog{width:min(760px,calc(100% - 24px));max-height:90vh;padding:0;border:0;border-radius:16px;box-shadow:0 30px 90px rgba(0,0,0,.25)}dialog::backdrop{background:rgba(10,18,34,.65)}.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--line)}.modal-head h2{margin:0}.close{background:transparent;color:var(--ink);font-size:22px}.detail{padding:24px}.facts{display:grid;grid-template-columns:1fr 1fr;gap:12px 22px;margin-bottom:24px}.fact{min-width:0}.fact span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase}.fact b{display:block;overflow-wrap:anywhere}.editor{display:grid;grid-template-columns:1fr 1fr;gap:15px;padding-top:21px;border-top:1px solid var(--line)}.editor label{display:grid;gap:5px;font-weight:700}.editor .full{grid-column:1/-1}.editor textarea{min-height:110px;resize:vertical}.actions{display:flex;align-items:center;gap:13px}.status{color:var(--muted);font-size:12px}.status.error{color:var(--red)}.status.success{color:var(--green)}@media(max-width:700px){.head,.toolbar{align-items:stretch;flex-direction:column}.token,.filters{flex-direction:column}.token input{min-width:0}.facts,.editor{grid-template-columns:1fr}.editor .full{grid-column:auto}}
  </style>
</head>
<body>
  <header><div class="wrap head"><div><h1>PillowFlow™ Founding Drivers</h1><p>Manual referral review dashboard</p></div><form class="token" id="token-form"><input id="admin-token" type="password" autocomplete="current-password" placeholder="Admin token" aria-label="Admin token" required><button>Open dashboard</button></form></div></header>
  <main class="wrap"><div class="toolbar"><div class="filters"><select id="type-filter" aria-label="Filter by referral type"><option value="">All referral types</option><option value="driver_referral">Driver referrals</option><option value="fleet_referral">Fleet referrals</option><option value="creator_referral">Creator referrals</option></select><select id="status-filter" aria-label="Filter by status"><option value="">All statuses</option><option>submitted</option><option>reviewing</option><option>approved</option><option>code_created</option><option>converted</option><option>reward_pending</option><option>paid</option><option>rejected</option></select><button type="button" id="export-csv">Export filtered CSV</button></div><div class="summary" id="summary">Enter the admin token to load referrals.</div></div><section class="panel"><div class="table-wrap"><table><thead><tr><th>Submitted</th><th>Type</th><th>Referrer</th><th>Referral</th><th>Source site</th><th>Status</th><th>Reward</th><th>Payout</th></tr></thead><tbody id="rows"><tr><td class="empty" colspan="8">No referrals loaded.</td></tr></tbody></table></div></section></main>
  <dialog id="detail-dialog"><div class="modal-head"><h2>Referral detail</h2><button class="close" id="close-detail" aria-label="Close">×</button></div><div class="detail"><div class="facts" id="facts"></div><form class="editor" id="editor"><label>Status<select name="status"><option>submitted</option><option>reviewing</option><option>approved</option><option>code_created</option><option>converted</option><option>reward_pending</option><option>paid</option><option>rejected</option></select></label><label>Reward amount<input name="reward_amount" type="number" min="0" step="0.01"></label><label>Payout status<select name="payout_status"><option>not_ready</option><option>pending</option><option>paid</option><option>cancelled</option></select></label><label class="full">Admin notes<textarea name="admin_notes"></textarea></label><div class="actions full"><button>Save changes</button><span class="status" id="save-status" role="status"></span></div></form></div></dialog>
  <script src="referrals-admin.js"></script>
</body>
</html>
